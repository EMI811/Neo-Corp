<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoCorp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">NeoCorp</div>
    <ul class="nav-links">
    <li><a href="#juegos">Juegos</a></li>
    <li><a href="#noticias">Noticias</a></li>
    <li><a href="#videos">Videos</a></li>
    <li><a href="#tienda">Tienda</a></li>
</ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>NeoIntelligence</h1>

            <p>Nueva y unica.</p>

            <button class="btn-main">DESCRIPCION</button>
        </div>
         <div class="hero-image">
                    <img src="img/intelligence.png" alt="Imagen del Juego">
        </div>
    </header>
<section id="juegos" class="section-padding">
    <h2 class="section-title">Familia NeoCorp</h2>
    <div class="games-grid">
        <div class="game-card" style="background-image: url('img/juego1.jpg');">
            <div class="game-info"><h3>NeoSim</h3></div>
        </div>
        <div class="game-card" style="background-image: url('img/juego2.jpg');">
            <div class="game-info"><h3>NeoIntelligence</h3></div>
        </div>
        <div class="game-card" style="background-image: url('img/juego3.jpg');">
            <div class="game-info"><h3>NeoAI</h3></div>
        </div>
    </div>
</section>

<section id="videos" class="section-padding alternate-bg">
    <h2 class="section-title">NeoIntelligence</h2>
</section>

<section id="tienda" class="section-padding">
    <h2 class="section-title">Tienda</h2>
    <div class="shop-grid">
        <div class="shop-item">
            <div class="item-img"></div>
            <p>Nothing - $-</p>
            <button class="btn-buy">Buy</button>
        </div>
        <div class="shop-item">
            <div class="item-img"></div>
            <p>Nothing - $-</p>
            <button class="btn-buy">Buy</button>
        </div>
    </div>
</section>
    <section class="news-section">
        <h2>Últimas Noticias</h2>
        <div class="news-grid">
            <div class="card">Noticia 1</div>
            <div class="card">Noticia 2</div>
            <div class="card">Noticia 3</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
