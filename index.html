<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockstar Style Concept</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">NeoCorp</div>
        <ul class="nav-links">
            <li><a href="#">Juegos</a></li>
            <li><a href="#">Noticias</a></li>
            <li><a href="#">Videos</a></li>
            <li><a href="#">Tienda</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>NeoIntelligence</h1>
            <p>La nueva y mejorada IA de NeoCorp.</p>
        <div> 
            <div class="hero-image">
                    <img src="img/intelligence.png" alt="Imagen del Juego">
                </div>
            <div>
            <button class="btn-main">VER AHORA</button>
        </div>
    </header>

    <section class="news-section">
        <h2>Últimas Noticias</h2>
        <div class="news-grid">
            <div class="card">Noticia 1</div>
            <div class="card">Noticia 2</div>
            <div class="card">Noticia 3</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
